services:
  worker1:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    image: emjudge-worker:latest
    container_name: emjudge-worker-1
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WORKER_ID: worker-1
      CACHE_ROOT_DIR: /var/emjudge/worker1-cache
      JUDGE_IMAGE: emjudge-judge:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./worker-data/worker1:/var/emjudge

  worker2:
    image: emjudge-worker:latest
    container_name: emjudge-worker-2
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WORKER_ID: worker-2
      CACHE_ROOT_DIR: /var/emjudge/worker2-cache
      JUDGE_IMAGE: emjudge-judge:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./worker-data/worker2:/var/emjudge

  worker3:
    image: emjudge-worker:latest
    container_name: emjudge-worker-3
    restart: unless-stopped
    env_file:
      - .env
    environment:
      WORKER_ID: worker-3
      CACHE_ROOT_DIR: /var/emjudge/worker3-cache
      JUDGE_IMAGE: emjudge-judge:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./worker-data/worker3:/var/emjudge
