services:
  worker1:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    image: emjudge-worker:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      WORKER_ID: ${WORKER1_ID:-newbox-worker-1}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-3000}
      STALE_JOB_TIMEOUT_MS: ${STALE_JOB_TIMEOUT_MS:-300000}
      CACHE_ROOT_DIR: /cache
      JUDGE_IMAGE: ${JUDGE_IMAGE:-judge-runner:latest}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - worker1_cache:/cache

  worker2:
    image: emjudge-worker:latest
    restart: unless-stopped
    depends_on:
      - worker1
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      WORKER_ID: ${WORKER2_ID:-newbox-worker-2}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-3000}
      STALE_JOB_TIMEOUT_MS: ${STALE_JOB_TIMEOUT_MS:-300000}
      CACHE_ROOT_DIR: /cache
      JUDGE_IMAGE: ${JUDGE_IMAGE:-judge-runner:latest}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - worker2_cache:/cache

  worker3:
    image: emjudge-worker:latest
    restart: unless-stopped
    depends_on:
      - worker1
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      WORKER_ID: ${WORKER3_ID:-newbox-worker-3}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-3000}
      STALE_JOB_TIMEOUT_MS: ${STALE_JOB_TIMEOUT_MS:-300000}
      CACHE_ROOT_DIR: /cache
      JUDGE_IMAGE: ${JUDGE_IMAGE:-judge-runner:latest}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - worker3_cache:/cache

volumes:
  worker1_cache:
  worker2_cache:
  worker3_cache:
