base_path: .
preserve_hierarchy: true

export_languages:
  - zh-TW
  - zh-CN
  - ja
  - fr
  - de
  - es
  - it
  - pt-PT
  - pt-BR
  - ru
  - ko
  - uk
  - pl
  - tr

files:
  - source: /apps/web/src/i18n/locales/en/translation.json
    translation: /apps/web/src/i18n/locales/%locale%/%original_file_name%
    languages_mapping:
      locale:
        zh-CN: zh-CN
        zh-TW: zh-TW
        ja-JP: ja
        fr-FR: fr
        de-DE: de
        es-ES: es
        it-IT: it
        pt-PT: pt-PT
        pt-BR: pt-BR
        ru-RU: ru
        ko-KR: ko
        uk-UA: uk
        pl-PL: pl
        tr-TR: tr
        en-US: en
